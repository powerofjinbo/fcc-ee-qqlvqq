<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="3050" viewBox="0 0 1800 3050">
  <defs>
    <style>
      .bg { fill: #f7f4ee; }
      .panel { fill: #fffdfa; stroke: #cbd5df; stroke-width: 2; rx: 28; ry: 28; }
      .soft-green { fill: #dff4ec; }
      .soft-gold { fill: #f7efd5; }
      .soft-coral { fill: #f7e2dd; }
      .soft-blue { fill: #e7ecf4; }
      .title { font: 700 34px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #111827; }
      .section { font: 700 22px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #111827; }
      .body { font: 400 18px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #334155; }
      .small { font: 400 15px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #667085; }
      .mono { font: 700 15px "Aptos Mono", "SF Mono", monospace; fill: #13644a; }
      .chip { font: 700 15px "Aptos Mono", "SF Mono", monospace; fill: #111827; }
      .metric { font: 700 42px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #111827; }
      .metric-label { font: 400 16px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #475467; }
      .accent-green { fill: #1f9d74; }
      .accent-gold { fill: #d6a542; }
      .accent-coral { fill: #d46a58; }
      .accent-blue { fill: #4f7cac; }
      .white { fill: #ffffff; }
      .rule { stroke: #cbd5df; stroke-width: 2; }
      .arrow { stroke: #1f9d74; stroke-width: 6; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1f9d74"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="3050"/>
  <circle cx="70" cy="80" r="220" fill="#dff4ec" opacity="0.75"/>
  <circle cx="1710" cy="120" r="170" fill="#f7efd5" opacity="0.85"/>
  <circle cx="1700" cy="2920" r="180" fill="#f7e2dd" opacity="0.80"/>

  <rect x="70" y="50" width="1660" height="18" fill="#1f9d74"/>
  <text x="90" y="128" class="mono">FCC lvqq / ML Architecture Map</text>
  <text x="90" y="182" class="title">FCC 项目 ML 结构总览图</text>
  <text x="90" y="224" class="body">把代码里的三层链条放到一张图上：样本与 cut、开发评估训练线、最终 5-fold 打分与统计拟合线。</text>

  <rect x="90" y="260" width="210" height="44" rx="16" class="soft-green"/>
  <text x="118" y="289" class="chip">XGBoost BDT</text>
  <rect x="320" y="260" width="250" height="44" rx="16" class="soft-gold"/>
  <text x="348" y="289" class="chip">70/30 + 20% val</text>
  <rect x="590" y="260" width="190" height="44" rx="16" class="soft-coral"/>
  <text x="618" y="289" class="chip">5-fold OOF</text>
  <rect x="800" y="260" width="220" height="44" rx="16" class="soft-blue"/>
  <text x="828" y="289" class="chip">pyhf 20-bin fit</text>
  <rect x="1040" y="260" width="235" height="44" rx="16" class="soft-green"/>
  <text x="1068" y="289" class="chip">7 sequential cuts</text>

  <rect x="80" y="340" width="1640" height="420" class="panel"/>
  <text x="110" y="392" class="section">1. 样本与输入层：先定义 signal / background，再统一写进 treemaker</text>
  <text x="1450" y="392" class="mono">code: ml_config.py / run_lvqq.py</text>

  <rect x="110" y="430" width="490" height="270" class="panel"/>
  <rect x="110" y="430" width="10" height="270" class="accent-green"/>
  <text x="140" y="468" class="section">Signal 入口</text>
  <text x="140" y="506" class="body">
    <tspan x="140" dy="0">4 个 hadronic-Z signal 样本：</tspan>
    <tspan x="140" dy="30">wzp6_ee_qqH_HWW_ecm240</tspan>
    <tspan x="140" dy="30">wzp6_ee_bbH_HWW_ecm240</tspan>
    <tspan x="140" dy="30">wzp6_ee_ccH_HWW_ecm240</tspan>
    <tspan x="140" dy="30">wzp6_ee_ssH_HWW_ecm240</tspan>
    <tspan x="140" dy="40">训练时 label=1；fit 里也保留信号模板。</tspan>
  </text>

  <rect x="625" y="430" width="540" height="270" class="panel"/>
  <rect x="625" y="430" width="10" height="270" class="accent-gold"/>
  <text x="655" y="468" class="section">Background 物理分组</text>
  <text x="655" y="506" class="body">
    <tspan x="655" dy="0">最终 fit 按 5 组背景看待：</tspan>
    <tspan x="655" dy="30">WW / ZZ / qq / tautau / ZH_other</tspan>
    <tspan x="655" dy="40">其中 ZH(other) 不是丢掉，而是保留为不可忽略背景。</tspan>
    <tspan x="655" dy="30">大背景样本默认全统计；也支持按组改 fraction。</tspan>
    <tspan x="655" dy="30">环境变量：LVQQ_BACKGROUND_FRACTION 或各组专门 override。</tspan>
  </text>

  <rect x="1190" y="430" width="500" height="270" class="panel"/>
  <rect x="1190" y="430" width="10" height="270" class="accent-coral"/>
  <text x="1220" y="468" class="section">统一入口与标准顺序</text>
  <text x="1220" y="506" class="body">
    <tspan x="1220" dy="0">run_lvqq.py 负责调度：</tspan>
    <tspan x="1220" dy="30">histmaker -&gt; treemaker -&gt; train -&gt; apply</tspan>
    <tspan x="1220" dy="30">-&gt; fit -&gt; plots -&gt; paper</tspan>
    <tspan x="1220" dy="40">关键输入目录：</tspan>
    <tspan x="1220" dy="30">output/h_hww_lvqq/treemaker/ecm240/</tspan>
  </text>

  <line x1="900" y1="760" x2="900" y2="835" class="arrow"/>

  <rect x="80" y="845" width="1640" height="560" class="panel"/>
  <text x="110" y="897" class="section">2. 物理选择层：7 个顺序 cut + Z-priority pairing + 20 个高层特征</text>
  <text x="1360" y="897" class="mono">code: h_hww_lvqq.py / plots_lvqq.py</text>

  <rect x="110" y="940" width="610" height="400" class="panel"/>
  <rect x="110" y="940" width="10" height="400" class="accent-green"/>
  <text x="140" y="978" class="section">7 个顺序 cut，全部发生在 ML 之前</text>
  <text x="140" y="1016" class="body">
    <tspan x="140" dy="0">cut1  恰好 1 个 p&gt;20 GeV 的 lepton</tspan>
    <tspan x="140" dy="30">cut2  isolation &lt; 0.15</tspan>
    <tspan x="140" dy="30">cut3  veto 额外 p&gt;5 GeV lepton</tspan>
    <tspan x="140" dy="30">cut4  missingEnergy_e &gt; 20 GeV</tspan>
    <tspan x="140" dy="30">cut5  去掉 lepton 后聚成 exactly 4 jets</tspan>
    <tspan x="140" dy="30">cut6  |m(Zcand)-91.19| &lt; 15 GeV</tspan>
    <tspan x="140" dy="30">cut7  |m(recoil)-125| &lt; 20 GeV</tspan>
    <tspan x="140" dy="40">只有 survivors 才会写进 treemaker ROOT。</tspan>
  </text>

  <rect x="750" y="940" width="430" height="400" class="panel"/>
  <rect x="750" y="940" width="10" height="400" class="accent-gold"/>
  <text x="780" y="978" class="section">Z-priority pairing</text>
  <text x="780" y="1016" class="body">
    <tspan x="780" dy="0">4 jets 有 3 种 disjoint pairing。</tspan>
    <tspan x="780" dy="30">代码选“最接近 mZ 的那一对”当 Zcand，</tspan>
    <tspan x="780" dy="30">剩下两 jet 自动组成 hadronic W*。</tspan>
    <tspan x="780" dy="40">核心意义：</tspan>
    <tspan x="780" dy="30">不对 off-shell W* 施加错误的 mW 约束。</tspan>
    <tspan x="780" dy="30">后面很多高层变量都建立在这个配对上。</tspan>
  </text>

  <rect x="1210" y="940" width="480" height="400" class="panel"/>
  <rect x="1210" y="940" width="10" height="400" class="accent-coral"/>
  <text x="1240" y="978" class="section">ML 特征清单（20 个）</text>
  <text x="1240" y="1016" class="body">
    <tspan x="1240" dy="0">lepton / MET：lepton_p, lepton_iso, missingMass, ...</tspan>
    <tspan x="1240" dy="30">jet kinematics：jet0_p ~ jet3_p</tspan>
    <tspan x="1240" dy="30">mass-like：Zcand_dm, Wstar_m, recoil_dmH, Wlep_m, Hcand_m</tspan>
    <tspan x="1240" dy="30">event shape：thrust, angleLepMiss</tspan>
    <tspan x="1240" dy="30">clustering：d_23, d_34</tspan>
    <tspan x="1240" dy="40">Spectators 只有 weight, njets。</tspan>
    <tspan x="1240" dy="30">paper 里最强特征是 d34，importance = 42.5%。</tspan>
  </text>

  <line x1="900" y1="1405" x2="900" y2="1485" class="arrow"/>

  <rect x="80" y="1495" width="1640" height="760" class="panel"/>
  <text x="110" y="1547" class="section">3. 开发评估训练线：70/30 split、训练内 20% validation、grid search、AUC/KS 报告</text>
  <text x="1190" y="1547" class="mono">code: ml/train_xgboost_bdt.py</text>

  <rect x="110" y="1610" width="280" height="170" class="panel"/>
  <rect x="110" y="1610" width="280" height="10" class="accent-green"/>
  <text x="140" y="1688" class="metric">100%</text>
  <text x="140" y="1730" class="metric-label">全体选中事件 full_df</text>
  <text x="140" y="1760" class="small">sig_df + bkg_df -&gt; X, y, phys_weight</text>

  <line x1="410" y1="1695" x2="500" y2="1695" class="arrow"/>

  <rect x="520" y="1610" width="280" height="170" class="panel"/>
  <rect x="520" y="1610" width="280" height="10" class="accent-gold"/>
  <text x="550" y="1688" class="metric">70%</text>
  <text x="550" y="1730" class="metric-label">开发训练块 idx_train</text>
  <text x="550" y="1760" class="small">真正训练和 validation 都从这里再切</text>

  <line x1="820" y1="1695" x2="910" y2="1695" class="arrow"/>

  <rect x="930" y="1610" width="280" height="170" class="panel"/>
  <rect x="930" y="1610" width="280" height="10" class="accent-coral"/>
  <text x="960" y="1688" class="metric">30%</text>
  <text x="960" y="1730" class="metric-label">untouched test</text>
  <text x="960" y="1760" class="small">只用于开发性能：AUC / KS / test_scores.csv</text>

  <line x1="660" y1="1795" x2="660" y2="1865" class="arrow"/>

  <rect x="440" y="1880" width="280" height="170" class="panel"/>
  <rect x="440" y="1880" width="280" height="10" class="accent-green"/>
  <text x="470" y="1958" class="metric">56%</text>
  <text x="470" y="2000" class="metric-label">fit 子块 X_fit / y_fit / w_fit</text>
  <text x="470" y="2030" class="small">真正在这里训练树结构与参数</text>

  <line x1="740" y1="1965" x2="830" y2="1965" class="arrow"/>

  <rect x="850" y="1880" width="300" height="170" class="panel"/>
  <rect x="850" y="1880" width="300" height="10" class="accent-gold"/>
  <text x="880" y="1958" class="metric">14%</text>
  <text x="880" y="2000" class="metric-label">validation 子块</text>
  <text x="880" y="2030" class="small">从 70% 中切 20%，只用于 early stopping</text>

  <rect x="1240" y="1610" width="450" height="440" class="panel"/>
  <rect x="1240" y="1610" width="10" height="440" class="accent-blue"/>
  <text x="1270" y="1648" class="section">训练 recipe</text>
  <text x="1270" y="1686" class="body">
    <tspan x="1270" dy="0">1. 物理权重：</tspan>
    <tspan x="1270" dy="30">w = L * xsec / (ngen * processed_fraction)</tspan>
    <tspan x="1270" dy="40">2. 类别平衡：</tspan>
    <tspan x="1270" dy="30">normalize_class_weights() 让 signal/background</tspan>
    <tspan x="1270" dy="30">总权重平衡，但不破坏类内相对比重</tspan>
    <tspan x="1270" dy="40">3. grid search：</tspan>
    <tspan x="1270" dy="30">最多 50k 子样本上跑 108 组组合</tspan>
    <tspan x="1270" dy="30">depth(3,4,5) × lr(0.01,0.05,0.1) ×</tspan>
    <tspan x="1270" dy="30">mcw(5,10,20) × subsample(0.7,0.8) ×</tspan>
    <tspan x="1270" dy="30">colsample(0.7,0.8)</tspan>
    <tspan x="1270" dy="40">4. early stopping：</tspan>
    <tspan x="1270" dy="30">early_stopping_rounds = 30</tspan>
    <tspan x="1270" dy="30">先用 validation 找 best_iteration，再在整个 70% 训练块重训最终模型</tspan>
  </text>

  <rect x="110" y="2100" width="1060" height="105" class="panel"/>
  <rect x="110" y="2100" width="10" height="105" class="accent-coral"/>
  <text x="140" y="2138" class="section">开发阶段输出与过拟合检查</text>
  <text x="140" y="2176" class="body">
    <tspan x="140" dy="0">开发性能：paper/main.tex 给出 5-fold weighted AUC = 0.9711，单独的 70/30 train/test AUC = 0.9719 / 0.9710。</tspan>
    <tspan x="140" dy="30">过拟合报警逻辑：|train_auc - test_auc| &gt; 0.02 或 signal/background 的 KS statistic &gt; 0.05。</tspan>
  </text>

  <rect x="1200" y="2100" width="490" height="105" class="panel"/>
  <rect x="1200" y="2100" width="10" height="105" class="accent-gold"/>
  <text x="1230" y="2138" class="section">开发线落盘文件</text>
  <text x="1230" y="2176" class="body">xgboost_bdt.json / training_metrics.json / training_history.json / feature_importance.csv / test_scores.csv</text>

  <line x1="900" y1="2255" x2="900" y2="2335" class="arrow"/>

  <rect x="80" y="2345" width="1640" height="640" class="panel"/>
  <text x="110" y="2397" class="section">4. 最终拟合输入线：5-fold OOF score、apply 打分、counting scan 与 20-bin shape fit</text>
  <text x="1235" y="2397" class="mono">code: ml/train_xgboost_bdt.py / apply_xgboost_bdt.py / fit_profile_likelihood.py</text>

  <rect x="110" y="2470" width="500" height="210" class="panel"/>
  <rect x="110" y="2470" width="10" height="210" class="accent-green"/>
  <text x="140" y="2508" class="section">5-fold OOF 全样本打分</text>
  <text x="140" y="2546" class="body">
    <tspan x="140" dy="0">kfold_score_all() 用 StratifiedKFold(5) 跑全体事件。</tspan>
    <tspan x="140" dy="30">每个 event 的分数都来自“没训练过它”的模型。</tspan>
    <tspan x="140" dy="30">这条线不替代 70/30，而是为了给 fit 提供 100% 无偏 score。</tspan>
    <tspan x="140" dy="40">输出：kfold_scores.csv</tspan>
  </text>

  <rect x="650" y="2470" width="500" height="210" class="panel"/>
  <rect x="650" y="2470" width="10" height="210" class="accent-gold"/>
  <text x="680" y="2508" class="section">apply 重新写回 ROOT</text>
  <text x="680" y="2546" class="body">
    <tspan x="680" dy="0">apply_xgboost_bdt.py 会读取 treemaker ROOT，</tspan>
    <tspan x="680" dy="30">按 training_metrics.json 里的 feature 列顺序推断，</tspan>
    <tspan x="680" dy="30">再把 bdt_score 作为新 branch 写回：</tspan>
    <tspan x="680" dy="40">output/h_hww_lvqq/bdt_scored/ecm240/</tspan>
  </text>

  <rect x="1190" y="2470" width="500" height="210" class="panel"/>
  <rect x="1190" y="2470" width="10" height="210" class="accent-coral"/>
  <text x="1220" y="2508" class="section">fit 读哪份 score</text>
  <text x="1220" y="2546" class="body">
    <tspan x="1220" dy="0">fit_profile_likelihood.py 优先找 model_dir/kfold_scores.csv。</tspan>
    <tspan x="1220" dy="30">如果只有 test_scores.csv，才会把 phys_weight 再除以 0.30，</tspan>
    <tspan x="1220" dy="30">因为那只是 test fraction 的事件。</tspan>
  </text>

  <rect x="110" y="2720" width="500" height="210" class="panel"/>
  <rect x="110" y="2720" width="10" height="210" class="accent-green"/>
  <text x="140" y="2758" class="section">counting reference scan</text>
  <text x="140" y="2796" class="body">
    <tspan x="140" dy="0">scan_bdt_cut() 扫 1-bin counting 工作点：</tspan>
    <tspan x="140" dy="30">0.00-0.89 每 0.05，0.90-0.99 每 0.01。</tspan>
    <tspan x="140" dy="30">这是“cut-and-count 参考线”，不是最终 headline result。</tspan>
    <tspan x="140" dy="40">paper：best counting precision = 1.03% @ cut 0.97</tspan>
  </text>

  <rect x="650" y="2720" width="500" height="210" class="panel"/>
  <rect x="650" y="2720" width="10" height="210" class="accent-gold"/>
  <text x="680" y="2758" class="section">20-bin shape fit</text>
  <text x="680" y="2796" class="body">
    <tspan x="680" dy="0">最终默认 bdt_cut = 0.0，</tspan>
    <tspan x="680" dy="30">在 [0,1] 上均匀切 20 个 bin，做 BDT score 模板拟合。</tspan>
    <tspan x="680" dy="30">背景按 WW / ZZ / qq / tautau / ZH_other 分组。</tspan>
  </text>

  <rect x="1190" y="2720" width="500" height="210" class="panel"/>
  <rect x="1190" y="2720" width="10" height="210" class="accent-blue"/>
  <text x="1220" y="2758" class="section">系统误差与 headline result</text>
  <text x="1220" y="2796" class="body">
    <tspan x="1220" dy="0">每个背景组给 1% normsys。</tspan>
    <tspan x="1220" dy="30">默认再加 Barlow-Beeston staterror。</tspan>
    <tspan x="1220" dy="40">paper/main.tex：</tspan>
    <tspan x="1220" dy="30">shape-fit precision = 0.88%</tspan>
    <tspan x="1220" dy="30">physics-only floor = 0.79%</tspan>
  </text>

  <text x="90" y="3018" class="small">Source summary: run_lvqq.py | h_hww_lvqq.py | ml_config.py | ml/train_xgboost_bdt.py | ml/apply_xgboost_bdt.py | ml/fit_profile_likelihood.py | paper/main.tex</text>
</svg>
